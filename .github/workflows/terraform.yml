name: Terraform Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  generate-certs-and-deploy:
    name: Generate Certs + Terraform Plan/Apply
    runs-on: ubuntu-latest

    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE_NAME: Azure-Jenkins-VPN-25-03-2026
      TF_ORG: terraform-learningmyway
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate certificates
        env:
          ROOT_CA_PASS: ${{ secrets.ROOT_CA_PASS }}
          INTERMEDIATE_CA_PASS: ${{ secrets.INTERMEDIATE_CA_PASS }}
          PFX_PASS: ${{ secrets.PFX_PASS }}
        run: bash certs/generate-certs.sh

      - name: Push cert variables to Terraform Cloud
        env:
          ROOT_CA_PASS: ${{ secrets.ROOT_CA_PASS }}
          INTERMEDIATE_CA_PASS: ${{ secrets.INTERMEDIATE_CA_PASS }}
          PFX_PASS: ${{ secrets.PFX_PASS }}
        run: |
          # Get workspace ID
          WS_ID=$(curl -sf \
            -H "Authorization: Bearer $TF_API_TOKEN" \
            -H "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${TF_ORG}/workspaces/${TF_WORKSPACE_NAME}" \
            | jq -r '.data.id')
          echo "Workspace ID: $WS_ID"

          # Helper to upsert a TFC variable
          upsert_var() {
            local key=$1
            local value=$2
            local sensitive=${3:-true}

            # Check if variable exists
            EXISTING=$(curl -sf \
              -H "Authorization: Bearer $TF_API_TOKEN" \
              "https://app.terraform.io/api/v2/workspaces/${WS_ID}/vars" \
              | jq -r --arg k "$key" '.data[] | select(.attributes.key == $k) | .id')

            PAYLOAD=$(jq -n \
              --arg key "$key" \
              --arg value "$value" \
              --argjson sensitive "$sensitive" \
              '{data:{type:"vars",attributes:{key:$key,value:$value,category:"terraform",sensitive:$sensitive,hcl:false}}}')

            if [ -n "$EXISTING" ]; then
              curl -sf -X PATCH \
                -H "Authorization: Bearer $TF_API_TOKEN" \
                -H "Content-Type: application/vnd.api+json" \
                "https://app.terraform.io/api/v2/workspaces/${WS_ID}/vars/${EXISTING}" \
                -d "$PAYLOAD" > /dev/null
              echo "  Updated: $key"
            else
              curl -sf -X POST \
                -H "Authorization: Bearer $TF_API_TOKEN" \
                -H "Content-Type: application/vnd.api+json" \
                "https://app.terraform.io/api/v2/workspaces/${WS_ID}/vars" \
                -d "$PAYLOAD" > /dev/null
              echo "  Created: $key"
            fi
          }

          echo "Pushing cert variables to TFC..."
          upsert_var "root_ca_cert_pem"         "$(cat certs/root-ca/root-ca.cert.pem)"
          upsert_var "intermediate_ca_cert_pem" "$(cat certs/intermediate-ca/intermediate-ca.cert.pem)"
          upsert_var "jenkins_az_key_pem"       "$(cat certs/leaf/jenkins-az.key.pem)"
          upsert_var "jenkins_az_chain_pem"     "$(cat certs/leaf/jenkins-az.chain.pem)"
          upsert_var "jenkins_az_cert_pfx_b64"  "$(base64 -w0 certs/leaf/jenkins-az.pfx)"
          upsert_var "pfx_password"             "$PFX_PASS"
          echo "All cert variables pushed."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color
